<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>92mymy 就愛買買</title>
    <base href="/">
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- 👇 新增這段：強制跳出 IG/LINE/FB/Threads 內建瀏覽器的魔法 👇 -->
    <script>
      (function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        
        // 偵測是否為 IG, FB, LINE, Threads 等內建瀏覽器
        var isLine = ua.indexOf('Line') > -1 || ua.indexOf('LINE') > -1;
        var isFb = ua.indexOf('FBAN') > -1 || ua.indexOf('FBAV') > -1;
        var isIg = ua.indexOf('Instagram') > -1;
        // 💡 關鍵：加入 Barcelona (Threads 的內部開發代號) 防止漏網之魚
        var isThreads = ua.indexOf('Threads') > -1 || ua.indexOf('Barcelona') > -1;

        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isAndroid = /android/i.test(ua);

        // 如果確實在這些 APP 裡面
        if (isLine || isFb || isIg || isThreads) {
          var currentUrl = window.location.href;

          // 如果是 LINE，加上 ?openExternalBrowser=1 就能強制跳出
          if (isLine) {
            var targetUrl = currentUrl + (currentUrl.indexOf('?') > -1 ? '&' : '?') + 'openExternalBrowser=1';
            window.location.href = targetUrl;
          } 
          // 針對 Android 的 IG/FB/Threads (Intent 跳轉法，可自動跳)
          else if (isAndroid) {
            var cleanUrl = currentUrl.replace('https://', '').replace('http://', '');
            window.location.href = 'intent://' + cleanUrl + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
          }
          // 針對 iOS 的 IG/FB/Threads (無法自動跳 Safari，改用最穩定的 DOM 替換法顯示引導)
          else if (isIOS) {
            document.addEventListener("DOMContentLoaded", function() {
              // 覆蓋原本的畫面，顯示友善引導 (這招對 Threads 最有效)
              document.body.innerHTML = `
                <div style="padding: 40px 20px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
                  <h2 style="color: #E67E22; margin-bottom: 15px; font-size: 24px;">🛍️ 準備開始購物囉！</h2>
                  <p style="font-size: 16px; color: #555; line-height: 1.6;">為了給您最順暢的購物與結帳體驗，<br>請切換至手機的標準瀏覽器：</p>
                  
                  <div style="background: #f8f9fa; border-radius: 12px; padding: 20px; margin-top: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <p style="font-size: 18px; font-weight: bold; margin: 0 0 15px 0;">
                      👇 請點擊畫面<span style="color: red;">右上角 (或右下角)</span> 的「•••」
                    </p>
                    <p style="margin: 10px 0;">選擇 <span style="background: #e2e8f0; padding: 6px 12px; border-radius: 6px; font-weight: bold; color: #333;">「在系統瀏覽器中開啟」</span></p>
                    <p style="margin: 10px 0;">或 <span style="background: #e2e8f0; padding: 6px 12px; border-radius: 6px; font-weight: bold; color: #333;">「在 Safari 開啟」</span></p>
                  </div>
                  
                  <p style="font-size: 14px; color: #888; margin-top: 30px;">跳轉後即可正常登入，謝謝您！</p>
                </div>
              `;
            });
          }
        }
      })();
    </script>
    <!-- 👆 新增結束 👆 -->

  </head>
  <body class="bg-cream-50 text-brand-900 font-sans antialiased selection:bg-brand-300 selection:text-white">
    <app-root></app-root>
  </body>
</html>
